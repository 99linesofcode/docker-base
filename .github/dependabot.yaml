version: 2

updates:
  - package-ecosystem: gitsubmodule
    directory: /
    schedule:
      interval: daily
      time: '06:00'
    assignees:
      - 99linesofcode
    commit-message:
      prefix: fix
      prefix-development: chore
      include: scope

  - package-ecosystem: docker
    directory: /
    schedule:
      interval: daily
      time: '06:00'
    assignees:
      - 99linesofcode
    commit-message:
      prefix: fix
      prefix-development: chore
      include: scope

  - package-ecosystem: docker-compose
    directory: /
    schedule:
      interval: daily
      time: '06:00'
    assignees:
      - 99linesofcode
    commit-message:
      prefix: fix
      prefix-development: chore
      include: scope
